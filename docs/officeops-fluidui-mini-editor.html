<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OfficeOps Hub Mini Flow Editor</title>
    <style>
      :root {
        --bg: #edf2f7;
        --panel: #ffffff;
        --soft: #f8fafc;
        --ink: #111827;
        --muted: #64748b;
        --line: #d7dee9;
        --dark: #0f172a;
        --blue: #2563eb;
        --green: #16a34a;
        --violet: #7c3aed;
        --red: #dc2626;
        --shadow: 0 16px 36px rgba(15, 23, 42, 0.13);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        overflow: hidden;
        color: var(--ink);
        background: var(--bg);
        font-family:
          Inter,
          Pretendard,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app {
        display: grid;
        grid-template-columns: 280px 1fr 320px;
        grid-template-rows: 58px 1fr 32px;
        height: 100vh;
      }

      .topbar {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 0 16px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border-radius: 8px;
        background: var(--dark);
        color: white;
        font-weight: 900;
      }

      .brand strong {
        display: block;
        font-size: 15px;
      }

      .brand span {
        color: var(--muted);
        font-size: 11px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 7px;
      }

      .btn {
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: #334155;
        padding: 0 12px;
        font-weight: 800;
        cursor: pointer;
      }

      .btn.active,
      .btn.primary {
        border-color: var(--dark);
        background: var(--dark);
        color: #fff;
      }

      .sidebar,
      .inspector {
        overflow: auto;
        background: var(--panel);
      }

      .sidebar {
        border-right: 1px solid var(--line);
      }

      .inspector {
        border-left: 1px solid var(--line);
      }

      .panel {
        padding: 15px;
        border-bottom: 1px solid var(--line);
      }

      .panel h2 {
        margin: 0 0 12px;
        font-size: 13px;
      }

      .add-list,
      .screen-list {
        display: grid;
        gap: 8px;
      }

      .add-btn,
      .screen-row {
        display: grid;
        grid-template-columns: 34px 1fr;
        gap: 10px;
        align-items: center;
        width: 100%;
        padding: 9px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--soft);
        text-align: left;
      }

      .add-btn {
        cursor: pointer;
      }

      .icon {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border-radius: 8px;
        background: var(--dark);
        color: white;
        font-size: 12px;
        font-weight: 900;
      }

      .screen-row.active {
        border-color: rgba(37, 99, 235, 0.5);
        background: #eff6ff;
      }

      .screen-row strong,
      .add-btn strong {
        display: block;
        font-size: 12px;
      }

      .screen-row span,
      .add-btn span {
        display: block;
        color: var(--muted);
        font-size: 10px;
      }

      .workspace {
        position: relative;
        overflow: auto;
      }

      .canvas-tools {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(10px);
      }

      .filter-group {
        display: flex;
        gap: 7px;
      }

      .canvas {
        position: relative;
        width: 1600px;
        height: 1100px;
        transform-origin: top left;
        background:
          linear-gradient(#dbe3ee 1px, transparent 1px),
          linear-gradient(90deg, #dbe3ee 1px, transparent 1px),
          #f8fafc;
        background-size: 28px 28px;
      }

      .canvas.no-grid {
        background: #f8fafc;
      }

      svg.links {
        position: absolute;
        inset: 0;
        width: 1600px;
        height: 1100px;
        overflow: visible;
        pointer-events: none;
      }

      .node {
        position: absolute;
        width: 250px;
        min-height: 178px;
        padding: 12px;
        border: 2px solid #cbd5e1;
        border-radius: 12px;
        background: #fff;
        box-shadow: var(--shadow);
        cursor: grab;
        user-select: none;
      }

      .node.phone {
        width: 210px;
        min-height: 310px;
        border-radius: 22px;
      }

      .node.selected {
        border-color: var(--blue);
        box-shadow:
          0 0 0 4px rgba(37, 99, 235, 0.13),
          var(--shadow);
      }

      .node.hidden-flow {
        display: none;
      }

      .node-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }

      .node h3 {
        margin: 0;
        font-size: 15px;
      }

      .route {
        margin-top: 3px;
        color: var(--muted);
        font-size: 10px;
      }

      .pill {
        border-radius: 999px;
        padding: 4px 8px;
        background: #e2e8f0;
        color: #334155;
        font-size: 10px;
        font-weight: 900;
      }

      .pill.user {
        color: var(--blue);
        background: #dbeafe;
      }

      .pill.manager {
        color: var(--green);
        background: #dcfce7;
      }

      .pill.operator {
        color: var(--violet);
        background: #ede9fe;
      }

      .pill.hr {
        color: #0f766e;
        background: #ccfbf1;
      }

      .pill.finance {
        color: #b45309;
        background: #fef3c7;
      }

      .pill.admin {
        color: var(--red);
        background: #fee2e2;
      }

      .wire {
        display: grid;
        gap: 7px;
        padding: 10px;
        border-radius: 8px;
        background: var(--soft);
      }

      .line {
        height: 12px;
        border-radius: 999px;
        background: #d2dae6;
      }

      .line.short {
        width: 64%;
      }

      .block-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .block {
        height: 42px;
        border: 1px solid #d7dee8;
        border-radius: 8px;
        background: #fff;
      }

      .button-shape {
        width: 72px;
        height: 28px;
        border-radius: 7px;
        background: var(--dark);
      }

      .property {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
      }

      .property label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 900;
      }

      .property input,
      .property select {
        width: 100%;
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 0 10px;
      }

      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .help {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .statusbar {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
        border-top: 1px solid var(--line);
        background: var(--panel);
        color: var(--muted);
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">OH</div>
          <div>
            <strong>OfficeOps Hub Mini Editor</strong>
            <span>드래그 가능한 화면흐름도 편집기</span>
          </div>
        </div>
        <div class="toolbar">
          <button class="btn active" data-mode="edit">Edit</button>
          <button class="btn" data-mode="preview">Preview</button>
          <button class="btn" id="gridToggle">Grid On</button>
          <button class="btn" id="fitBtn">Fit</button>
          <button class="btn primary" id="resetBtn">Reset</button>
        </div>
      </header>

      <aside class="sidebar">
        <section class="panel">
          <h2>Add Screen</h2>
          <div class="add-list">
            <button class="add-btn" data-add="request">
              <span class="icon">REQ</span>
              <span><strong>요청 화면</strong><span>사용자 요청 카드 추가</span></span>
            </button>
            <button class="add-btn" data-add="reservation">
              <span class="icon">RSV</span>
              <span><strong>예약 화면</strong><span>회의실 예약 카드 추가</span></span>
            </button>
            <button class="add-btn" data-add="asset">
              <span class="icon">AST</span>
              <span><strong>자산 화면</strong><span>자산 관리 카드 추가</span></span>
            </button>
            <button class="add-btn" data-add="approval">
              <span class="icon">APR</span>
              <span><strong>전자결재 화면</strong><span>결재 문서 카드 추가</span></span>
            </button>
            <button class="add-btn" data-add="attendance">
              <span class="icon">ATT</span>
              <span><strong>근태 화면</strong><span>연차/출퇴근 카드 추가</span></span>
            </button>
            <button class="add-btn" data-add="finance">
              <span class="icon">FIN</span>
              <span><strong>재무 화면</strong><span>비용 처리 카드 추가</span></span>
            </button>
          </div>
        </section>

        <section class="panel">
          <h2>Screens</h2>
          <div class="screen-list" id="screenList"></div>
        </section>

        <section class="panel">
          <h2>How To Use</h2>
          <p class="help">카드를 클릭하면 오른쪽 속성 패널에서 이름, URL, 역할, 좌표를 수정할 수 있습니다. 카드는 캔버스에서 직접 드래그할 수 있습니다.</p>
        </section>
      </aside>

      <main class="workspace">
        <div class="canvas-tools">
          <div class="filter-group">
            <button class="btn active" data-flow="all">전체</button>
            <button class="btn" data-flow="request">요청 승인</button>
            <button class="btn" data-flow="reservation">회의실 예약</button>
            <button class="btn" data-flow="asset">자산 관리</button>
            <button class="btn" data-flow="attendance">근태</button>
            <button class="btn" data-flow="approval">전자결재</button>
            <button class="btn" data-flow="finance">재무</button>
            <button class="btn" data-flow="admin">관리자</button>
          </div>
          <div class="toolbar">
            <button class="btn" id="zoomOut">-</button>
            <strong id="zoomLabel">100%</strong>
            <button class="btn" id="zoomIn">+</button>
          </div>
        </div>
        <section class="canvas" id="canvas">
          <svg class="links" id="links" aria-hidden="true"></svg>
        </section>
      </main>

      <aside class="inspector">
        <section class="panel">
          <h2>Properties</h2>
          <div class="property">
            <label>Title</label>
            <input id="propTitle" />
          </div>
          <div class="property">
            <label>Route</label>
            <input id="propRoute" />
          </div>
          <div class="property">
            <label>Role</label>
            <select id="propRole">
              <option value="auth">AUTH</option>
              <option value="user">USER</option>
              <option value="manager">MANAGER</option>
              <option value="operator">OPERATOR</option>
              <option value="hr">HR</option>
              <option value="finance">FINANCE</option>
              <option value="admin">ADMIN</option>
            </select>
          </div>
          <div class="property">
            <label>Flow</label>
            <select id="propFlow">
              <option value="request">요청 승인</option>
              <option value="reservation">회의실 예약</option>
              <option value="asset">자산 관리</option>
              <option value="attendance">근태</option>
              <option value="approval">전자결재</option>
              <option value="finance">재무</option>
              <option value="admin">관리자</option>
            </select>
          </div>
          <div class="two-col">
            <div class="property">
              <label>X</label>
              <input id="propX" type="number" />
            </div>
            <div class="property">
              <label>Y</label>
              <input id="propY" type="number" />
            </div>
          </div>
          <button class="btn primary" id="applyProps">Apply</button>
        </section>

        <section class="panel">
          <h2>Selected Flow</h2>
          <p class="help" id="selectedHelp">화면 카드를 선택하면 속성을 편집할 수 있습니다.</p>
        </section>
      </aside>

      <footer class="statusbar">
        <span id="statusText">Ready · Drag screens on the canvas</span>
        <span>Local prototype · No data is saved</span>
      </footer>
    </div>

    <script>
      const initialNodes = [
        { id: "login", title: "로그인", route: "/login", role: "auth", flow: "request", x: 80, y: 110, type: "phone" },
        { id: "userHome", title: "사용자 홈", route: "/user", role: "user", flow: "request", x: 360, y: 110, type: "web" },
        { id: "requestCreate", title: "요청 등록", route: "/user/requests/new", role: "user", flow: "request", x: 360, y: 370, type: "web" },
        { id: "managerApproval", title: "팀 승인 상세", route: "/manager/approvals/:id", role: "manager", flow: "request", x: 690, y: 110, type: "web" },
        { id: "operatorDetail", title: "운영 요청 상세", route: "/operator/requests/:id", role: "operator", flow: "request", x: 1020, y: 110, type: "web" },
        { id: "reservation", title: "회의실 예약", route: "/user/reservations/new", role: "user", flow: "reservation", x: 80, y: 690, type: "web" },
        { id: "assetAdmin", title: "자산 관리", route: "/admin/assets", role: "admin", flow: "asset", x: 690, y: 690, type: "web" },
        { id: "attendanceHome", title: "내 근태 홈", route: "/user/attendance", role: "user", flow: "attendance", x: 360, y: 690, type: "web" },
        { id: "approvalCreate", title: "전자결재 작성", route: "/user/approvals/new", role: "user", flow: "approval", x: 360, y: 950, type: "web" },
        { id: "managerEApproval", title: "팀 전자결재 상세", route: "/manager/e-approvals/:id", role: "manager", flow: "approval", x: 690, y: 950, type: "web" },
        { id: "hrApprovals", title: "HR 전자결재함", route: "/hr/e-approvals", role: "hr", flow: "approval", x: 1020, y: 950, type: "web" },
        { id: "financeApprovals", title: "재무 전자결재함", route: "/finance/e-approvals", role: "finance", flow: "finance", x: 1350, y: 950, type: "web" },
        { id: "adminDashboard", title: "관리자 대시보드", route: "/admin/dashboard", role: "admin", flow: "admin", x: 1020, y: 410, type: "web" },
      ];

      const links = [
        ["login", "userHome"],
        ["userHome", "requestCreate"],
        ["requestCreate", "managerApproval"],
        ["managerApproval", "operatorDetail"],
        ["operatorDetail", "adminDashboard"],
        ["reservation", "assetAdmin"],
        ["userHome", "attendanceHome"],
        ["attendanceHome", "approvalCreate"],
        ["approvalCreate", "managerEApproval"],
        ["managerEApproval", "hrApprovals"],
        ["managerEApproval", "financeApprovals"],
        ["financeApprovals", "adminDashboard"],
      ];

      let nodes = structuredClone(initialNodes);
      let selectedId = "operatorDetail";
      let zoom = 1;
      let currentFlow = "all";
      let dragState = null;

      const canvas = document.getElementById("canvas");
      const linksSvg = document.getElementById("links");
      const screenList = document.getElementById("screenList");
      const statusText = document.getElementById("statusText");
      const selectedHelp = document.getElementById("selectedHelp");

      const fields = {
        title: document.getElementById("propTitle"),
        route: document.getElementById("propRoute"),
        role: document.getElementById("propRole"),
        flow: document.getElementById("propFlow"),
        x: document.getElementById("propX"),
        y: document.getElementById("propY"),
      };

      function roleLabel(role) {
        return { auth: "AUTH", user: "USER", manager: "MANAGER", operator: "OPS", hr: "HR", finance: "FIN", admin: "ADMIN" }[role] || role;
      }

      function roleName(role) {
        return { auth: "인증", user: "사용자", manager: "팀장", operator: "운영", hr: "HR", finance: "재무", admin: "관리자" }[role] || role;
      }

      function renderNodeContent(node) {
        const body =
          node.title.includes("홈") || node.title.includes("대시보드")
            ? `<div class="block-grid"><div class="block"></div><div class="block"></div><div class="block"></div><div class="block"></div></div>`
            : `<div class="wire"><div class="line"></div><div class="line"></div><div class="line short"></div><div class="button-shape"></div></div>`;

        return `
          <div class="node-head">
            <div>
              <h3>${node.title}</h3>
              <div class="route">${node.route}</div>
            </div>
            <span class="pill ${node.role}">${roleLabel(node.role)}</span>
          </div>
          ${body}
        `;
      }

      function render() {
        canvas.querySelectorAll(".node").forEach((node) => node.remove());

        nodes.forEach((node) => {
          const el = document.createElement("article");
          el.className = `node ${node.type === "phone" ? "phone" : ""} ${selectedId === node.id ? "selected" : ""}`;
          if (currentFlow !== "all" && node.flow !== currentFlow && node.role !== "auth") el.classList.add("hidden-flow");
          el.dataset.id = node.id;
          el.style.left = `${node.x}px`;
          el.style.top = `${node.y}px`;
          el.innerHTML = renderNodeContent(node);
          canvas.appendChild(el);
        });

        renderLinks();
        renderList();
        syncInspector();
      }

      function renderLinks() {
        linksSvg.innerHTML = `
          <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
              <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"></path>
            </marker>
          </defs>
        `;

        links.forEach(([fromId, toId]) => {
          const from = nodes.find((node) => node.id === fromId);
          const to = nodes.find((node) => node.id === toId);
          if (!from || !to) return;
          if (currentFlow !== "all" && from.flow !== currentFlow && to.flow !== currentFlow) return;

          const fromWidth = from.type === "phone" ? 210 : 250;
          const fromHeight = from.type === "phone" ? 310 : 178;
          const toHeight = to.type === "phone" ? 310 : 178;
          const x1 = from.x + fromWidth;
          const y1 = from.y + fromHeight / 2;
          const x2 = to.x;
          const y2 = to.y + toHeight / 2;
          const mid = Math.max(30, Math.abs(x2 - x1) / 2);
          const path = `M ${x1} ${y1} C ${x1 + mid} ${y1}, ${x2 - mid} ${y2}, ${x2} ${y2}`;
          const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
          line.setAttribute("d", path);
          line.setAttribute("fill", "none");
          line.setAttribute("stroke", "#94a3b8");
          line.setAttribute("stroke-width", "2");
          line.setAttribute("marker-end", "url(#arrow)");
          linksSvg.appendChild(line);
        });
      }

      function renderList() {
        screenList.innerHTML = "";
        nodes.forEach((node) => {
          const row = document.createElement("button");
          row.className = `screen-row ${selectedId === node.id ? "active" : ""}`;
          row.dataset.id = node.id;
          row.innerHTML = `
            <span class="icon">${roleLabel(node.role)}</span>
            <span><strong>${node.title}</strong><span>${node.route}</span></span>
          `;
          screenList.appendChild(row);
        });
      }

      function syncInspector() {
        const node = nodes.find((item) => item.id === selectedId);
        if (!node) return;
        fields.title.value = node.title;
        fields.route.value = node.route;
        fields.role.value = node.role;
        fields.flow.value = node.flow;
        fields.x.value = node.x;
        fields.y.value = node.y;
        selectedHelp.textContent = `${node.title} · ${roleName(node.role)} 권한 · ${node.route}`;
      }

      function selectNode(id) {
        selectedId = id;
        statusText.textContent = `${nodes.find((node) => node.id === id)?.title || "Screen"} selected`;
        render();
      }

      function applyInspector() {
        const node = nodes.find((item) => item.id === selectedId);
        if (!node) return;
        node.title = fields.title.value;
        node.route = fields.route.value;
        node.role = fields.role.value;
        node.flow = fields.flow.value;
        node.x = Number(fields.x.value || node.x);
        node.y = Number(fields.y.value || node.y);
        statusText.textContent = `${node.title} updated`;
        render();
      }

      function setZoom(next) {
        zoom = Math.min(1.3, Math.max(0.65, next));
        canvas.style.transform = `scale(${zoom})`;
        document.getElementById("zoomLabel").textContent = `${Math.round(zoom * 100)}%`;
      }

      canvas.addEventListener("mousedown", (event) => {
        const target = event.target.closest(".node");
        if (!target) return;
        const id = target.dataset.id;
        const node = nodes.find((item) => item.id === id);
        if (!node) return;
        selectNode(id);
        dragState = {
          id,
          startX: event.clientX,
          startY: event.clientY,
          nodeX: node.x,
          nodeY: node.y,
        };
      });

      window.addEventListener("mousemove", (event) => {
        if (!dragState) return;
        const node = nodes.find((item) => item.id === dragState.id);
        if (!node) return;
        node.x = Math.round(dragState.nodeX + (event.clientX - dragState.startX) / zoom);
        node.y = Math.round(dragState.nodeY + (event.clientY - dragState.startY) / zoom);
        render();
      });

      window.addEventListener("mouseup", () => {
        if (dragState) statusText.textContent = "Position updated";
        dragState = null;
      });

      screenList.addEventListener("click", (event) => {
        const row = event.target.closest(".screen-row");
        if (row) selectNode(row.dataset.id);
      });

      document.getElementById("applyProps").addEventListener("click", applyInspector);
      document.getElementById("zoomIn").addEventListener("click", () => setZoom(zoom + 0.1));
      document.getElementById("zoomOut").addEventListener("click", () => setZoom(zoom - 0.1));
      document.getElementById("fitBtn").addEventListener("click", () => setZoom(0.75));
      document.getElementById("resetBtn").addEventListener("click", () => {
        nodes = structuredClone(initialNodes);
        selectedId = "operatorDetail";
        currentFlow = "all";
        document.querySelectorAll("[data-flow]").forEach((btn) => btn.classList.toggle("active", btn.dataset.flow === "all"));
        setZoom(1);
        render();
      });

      document.getElementById("gridToggle").addEventListener("click", (event) => {
        canvas.classList.toggle("no-grid");
        event.currentTarget.textContent = canvas.classList.contains("no-grid") ? "Grid Off" : "Grid On";
      });

      document.querySelectorAll("[data-flow]").forEach((button) => {
        button.addEventListener("click", () => {
          currentFlow = button.dataset.flow;
          document.querySelectorAll("[data-flow]").forEach((item) => item.classList.toggle("active", item === button));
          render();
        });
      });

      document.querySelectorAll("[data-add]").forEach((button) => {
        button.addEventListener("click", () => {
          const type = button.dataset.add;
          const id = `${type}-${Date.now()}`;
          const presets = {
            request: { title: "새 요청 화면", route: "/user/requests/custom", role: "user", flow: "request" },
            reservation: { title: "새 예약 화면", route: "/user/reservations/custom", role: "user", flow: "reservation" },
            asset: { title: "새 자산 화면", route: "/admin/assets/custom", role: "admin", flow: "asset" },
            approval: { title: "새 전자결재 화면", route: "/user/approvals/custom", role: "user", flow: "approval" },
            attendance: { title: "새 근태 화면", route: "/user/attendance/custom", role: "user", flow: "attendance" },
            finance: { title: "새 재무 화면", route: "/finance/custom", role: "finance", flow: "finance" },
          };
          nodes.push({ id, ...presets[type], x: 180, y: 860, type: "web" });
          selectedId = id;
          render();
        });
      });

      render();
    </script>
  </body>
</html>
